# /etc/nginx/sites-available/poseidon
# Phase 1: HTTP only, reachable by IP. certbot rewrites this for TLS in phase 2.
server {
    listen 80;
    server_name app.poseidon-klimaanpassung.de;  # add your VM IP here too for early testing

    # Allow picture uploads (MEDIA). Raise if you expect larger files.
    client_max_body_size 25M;

    # Uploaded media is served by nginx directly (WhiteNoise only handles static).
    # This path must match MEDIA_ROOT in config/settings.py or .env
    location /media/ {
        alias /var/www/poseidon/media/;
        access_log off;
    }

    # Everything else (incl. WhiteNoise-served /static/) goes to gunicorn.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
